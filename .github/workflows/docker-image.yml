name: Docker Image

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  # Permet de déclencher le workflow manuellement depuis l'interface GitHub
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Nécessaire pour publier sur le GitHub Container Registry (ghcr.io)
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Connexion au GitHub Container Registry
        uses: docker/login-action@v3
        # On ne se connecte que si ce n'est pas une Pull Request (sécurité)
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraction des métadonnées (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha

      - name: Build et Push de l'image
        uses: docker/build-push-action@v5
        with:
          context: .
          # On publie l'image uniquement si on n'est pas sur une Pull Request
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Utilisation du cache GitHub Actions pour optimiser les temps de build
          cache-from: type=gha
          cache-to: type=gha,mode=max
