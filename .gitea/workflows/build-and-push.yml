name: Build & Push Deal-Voyager

on:
  push:
    branches:
      - main
  schedule:
    # rebuild les lundis à minuit UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: infomaniak
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Gitea Container Registry
        uses: docker/login-action@v3
        with:
          registry: gitea.doalo.fr
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push to Gitea Container Registry
        uses: docker/build-push-action@v5
        with:
          context: .
          file: compose.yml
          push: true
          tags: gitea.doalo.fr/${{ github.repository_owner }}/deal-voyager:latest