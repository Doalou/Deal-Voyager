version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: deal_voyager_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=deal_voyager
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d deal_voyager"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    container_name: deal_voyager_backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '3001:3001'
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/deal_voyager
      - PORT=3001

  frontend:
    container_name: deal_voyager_frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '4321:4321'
    depends_on:
      - backend

volumes:
  postgres_data: 