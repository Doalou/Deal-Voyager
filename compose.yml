services:
  db:
    image: postgres:15-alpine
    container_name: deal_voyager_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-dealvoyager}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${POSTGRES_DB:-deal_voyager}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dealvoyager} -d ${POSTGRES_DB:-deal_voyager}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    container_name: deal_voyager_backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-dealvoyager}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:-deal_voyager}
      - PORT=3001
      - ADMIN_USERNAME=${ADMIN_USERNAME:?ADMIN_USERNAME is required}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      - CORS_ORIGIN=http://frontend:3000

  frontend:
    container_name: deal_voyager_frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '${APP_PORT:-3000}:3000'
    environment:
      - NUXT_HOST=0.0.0.0
      - NUXT_PORT=3000
      - NUXT_API_INTERNAL_URL=http://backend:3001
      - ADMIN_USERNAME=${ADMIN_USERNAME:?ADMIN_USERNAME is required}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      - NUXT_PUBLIC_MATOMO_URL=${MATOMO_URL:-}
      - NUXT_PUBLIC_MATOMO_SITE_ID=${MATOMO_SITE_ID:-}
    depends_on:
      - backend

  matomo_db:
    image: mirror.gcr.io/mariadb:10.11
    container_name: deal_voyager_matomo_db
    restart: unless-stopped
    volumes:
      - matomo_db_data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MATOMO_DB_PASSWORD:?MATOMO_DB_PASSWORD is required}
      - MYSQL_DATABASE=matomo
      - MYSQL_USER=matomo
      - MYSQL_PASSWORD=${MATOMO_DB_PASSWORD:?MATOMO_DB_PASSWORD is required}

  matomo:
    image: mirror.gcr.io/matomo:latest
    container_name: deal_voyager_matomo
    restart: unless-stopped
    volumes:
      - matomo_data:/var/www/html
    environment:
      - MATOMO_DATABASE_HOST=matomo_db
      - MATOMO_DATABASE_DBNAME=matomo
      - MATOMO_DATABASE_USERNAME=matomo
      - MATOMO_DATABASE_PASSWORD=${MATOMO_DB_PASSWORD:?MATOMO_DB_PASSWORD is required}
    ports:
      - '${MATOMO_PORT:-8080}:80'
    depends_on:
      - matomo_db

volumes:
  postgres_data:
  matomo_db_data:
  matomo_data:
