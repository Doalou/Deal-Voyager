services:
  db:
    image: postgres:15-alpine
    container_name: deal_voyager_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-dealvoyager}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${POSTGRES_DB:-deal_voyager}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-dealvoyager} -d ${POSTGRES_DB:-deal_voyager}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    container_name: deal_voyager_backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-dealvoyager}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:-deal_voyager}
      - PORT=3001
      - ADMIN_USERNAME=${ADMIN_USERNAME:?ADMIN_USERNAME is required}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      - CORS_ORIGIN=http://frontend:3000
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID:-}
      - PUPPETEER_EXECUTABLE_PATH=${PUPPETEER_EXECUTABLE_PATH:-}
      - PUPPETEER_HEADLESS=${PUPPETEER_HEADLESS:-true}
      - PUPPETEER_ARGS=${PUPPETEER_ARGS:-}
      - RECAPTCHA_PROVIDER_ID=${RECAPTCHA_PROVIDER_ID:-2captcha}
      - RECAPTCHA_TOKEN=${RECAPTCHA_TOKEN:-}
      - RECAPTCHA_VISUAL_FEEDBACK=${RECAPTCHA_VISUAL_FEEDBACK:-true}

  frontend:
    container_name: deal_voyager_frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - NUXT_HOST=0.0.0.0
      - NUXT_PORT=3000
      - NUXT_API_INTERNAL_URL=http://backend:3001
      - ADMIN_USERNAME=${ADMIN_USERNAME:?ADMIN_USERNAME is required}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      - NUXT_PUBLIC_DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID:-}
    depends_on:
      - backend

volumes:
  postgres_data:
